<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ecommerce Layout</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}


/* HERO (now below navbar) */
.hero {
    margin: 20px auto;
  width: 90%;
}

/* Carousel */
.carousel {
  max-width: 1300px;
  margin: 20px auto;
  overflow: hidden;
  border-radius: 10px;
}

.track {
  display: flex;
  transition: transform 0.6s ease-in-out;
}

.slide {
  min-width: 100%;
  position: relative;
}

/* Image */
.slide img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

/* Light gradient (ecommerce style) */
.slide::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(0,0,0,0.3), rgba(255,255,255,0.2));
}

/* Text */
.overlay {
  position: absolute;
  top: 50%;
  left: 5%;
  transform: translateY(-50%);
  z-index: 2;
  max-width: 400px;
}

.overlay h2 {
  font-size: 42px;
  color: white;
  margin-bottom: 10px;
}

.overlay p {
  font-size: 18px;
  color: white;
  margin-bottom: 20px;
}

/* Button */
.overlay button {
  padding: 12px 25px;
  background: #ff4d4d;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

.overlay button:hover {
  background: #e63e3e;
}
  </style>
</head>
<body>


<!-- HERO -->
<section class="hero">
  <div class="carousel">
    <div class="track">

      <div class="slide">
        <img src="src/1.jpg">
        <div class="overlay">
          <h2>Summer Sale</h2>
          <p>Up to 50% off selected items</p>
          <button>Shop Now</button>
        </div>
      </div>

      <div class="slide">
        <img src="src/2.jpg">
        <div class="overlay">
          <h2>New Arrivals</h2>
          <p>Fresh styles just dropped</p>
          <button>Explore</button>
        </div>
      </div>

      <div class="slide">
        <img src="src/3.jpg">
        <div class="overlay">
          <h2>Best Deals</h2>
          <p>Limited time offers</p>
          <button>Shop Deals</button>
        </div>
      </div>

    </div>
  </div>
</section>

<script>
    const track = document.querySelector('.track');
const slides = document.querySelectorAll('.slide');

let index = 0;

function moveSlide() {
  index++;

  if (index >= slides.length) {
    index = 0;
  }

  track.style.transform = `translateX(-${index * 100}%)`;
}

setInterval(moveSlide, 3000);
</script>
</body>
</html>
